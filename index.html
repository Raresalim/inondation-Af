<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
<link rel="stylesheet" href="css/L.Control.Locate.min.css">
<link rel="stylesheet" href="css/qgis2web.css">
<link rel="stylesheet" href="css/fontawesome-all.min.css">
<link rel="stylesheet" href="css/leaflet.photon.css">

<style>
html, body, #map {
    width: 100%;
    height: 100%;
    padding: 0;
    margin: 0;
}

/* ===== Legend style ===== */
.legend {
    line-height: 14px;
    color: #555;
    background-color: #fff;
    border: 1px solid #ccc;
    padding: 4px 6px;
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
    border-radius: 5px;
    font-size: 10px;
}
.legend i {
    width: 12px;
    height: 12px;
    float: left;
    margin-right: 5px;
    opacity: 0.7;
}

/* ===== © Google | Leaflet ===== */
.attribution-text {
    position: absolute;
    bottom: 2px;
    left: 2px;
    font-size: 9px;
    color: #555;
    background: rgba(255,255,255,0.7);
    padding: 2px 4px;
    border-radius: 3px;
    pointer-events: none; /* لا يمكن الضغط عليه */
    z-index: 1000;
}
</style>
<title></title>
</head>

<body>
<div id="map"></div>

<!-- نص Attribution صغير أسفل الخريطة -->
<div class="attribution-text">© Google | Leaflet</div>

<script src="js/qgis2web_expressions.js"></script>
<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/L.Control.Locate.min.js"></script>
<script src="js/leaflet.rotatedMarker.js"></script>
<script src="js/leaflet.pattern.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>
<script src="js/rbush.min.js"></script>
<script src="js/labelgun.min.js"></script>
<script src="js/labels.js"></script>
<script src="js/leaflet.photon.js"></script>
<script src="data/valle_2.js"></script>

<script>
var map = L.map('map', {zoomControl:false, maxZoom:28, minZoom:1})
    .fitBounds([[34.07070695798943,2.0247091842979508],[34.1295572927578,2.1502987500850277]]);

var hash = new L.Hash(map);

/* ===== إزالة Attribution الافتراضية ===== */
map.attributionControl.setPrefix('');
map.attributionControl.remove();

/* ===== Controls ===== */
L.control.zoom({position: 'topleft'}).addTo(map);
L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);

/* ===== Google Terrain ===== */
map.createPane('pane_GoogleTerrain_0');
map.getPane('pane_GoogleTerrain_0').style.zIndex = 400;
var layer_GoogleTerrain_0 = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
    pane: 'pane_GoogleTerrain_0',
    opacity: 1.0,
    attribution: '',
    minZoom: 1,
    maxZoom: 28
});
map.addLayer(layer_GoogleTerrain_0);

/* ===== Google Satellite ===== */
map.createPane('pane_GoogleSatellite_1');
map.getPane('pane_GoogleSatellite_1').style.zIndex = 401;
var layer_GoogleSatellite_1 = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    pane: 'pane_GoogleSatellite_1',
    opacity: 1.0,
    attribution: '',
    minZoom: 1,
    maxZoom: 28
});
map.addLayer(layer_GoogleSatellite_1);

/* ===== Valleys Layer ===== */
map.createPane('pane_valle_2');
map.getPane('pane_valle_2').style.zIndex = 402;

function style_valle_2_0() {
    return {
        pane: 'pane_valle_2',
        opacity: 1,
        color: 'rgba(40,147,255,1.0)',
        weight: 2,
        fillOpacity: 0,
        interactive: true
    };
}

var layer_valle_2 = new L.geoJson(json_valle_2, {
    pane: 'pane_valle_2',
    style: style_valle_2_0,
    interactive: true
});
map.addLayer(layer_valle_2);

/* ===== Flood raster ===== */
map.createPane('pane_inondation_3');
map.getPane('pane_inondation_3').style.zIndex = 403;
var img_inondation_3 = 'data/inondation_3.png';
var img_bounds_inondation_3 = [[34.003877796038815,1.9582657201163127],[34.18228355286628,2.1954789811276023]];

var layer_inondation_3 = L.imageOverlay(
    img_inondation_3,
    img_bounds_inondation_3,
    {pane: 'pane_inondation_3'}
);
map.addLayer(layer_inondation_3);

/* ===== Layers control ===== */
var overlaysTree = [
    {label: "Inondation", layer: layer_inondation_3},
    {label: '<img src="legend/valle_2.png" /> Vallée', layer: layer_valle_2},
    {label: "Google Satellite", layer: layer_GoogleSatellite_1},
    {label: "Google Terrain", layer: layer_GoogleTerrain_0}
];
L.control.layers.tree(null, overlaysTree, {collapsed: true}).addTo(map);

/* ===== Legend (صغير) ===== */
var legend = L.control({ position: 'bottomright' });

legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');
    div.style.fontSize = "9px";  // تصغير حجم الخط
    div.style.padding = "3px 5px";
    div.style.lineHeight = "12px";
    div.style.maxWidth = "120px";

    div.innerHTML = '<b style="font-size:10px;">Profondeur d’inondation (m)</b><br>';

    var grades = [0, 1.9, 2.8, 3.8];
    var colors = ['#e6f0fa', '#87cefa', '#4682b4', '#000080'];

    for (var i = 0; i < grades.length; i++) {
        div.innerHTML +=
            '<i style="background:' + colors[i] + ';"></i> ' +
            grades[i] + (grades[i + 1] ? ' – ' + grades[i + 1] + '<br>' : '+');
    }
    return div;
};
legend.addTo(map);

</script>
</body>
</html>
